services:
  db:
    image: postgis/postgis:16-3.4
    container_name: trusthalal-db
    environment:
      POSTGRES_USER: trusthalal
      POSTGRES_PASSWORD: trusthalal
      POSTGRES_DB: trusthalal
    ports:
      # Bind to loopback only. The default password is a dev convenience;
      # binding 0.0.0.0 would expose a superuser DB to anyone on the LAN.
      - "127.0.0.1:5432:5432"
    volumes:
      - trusthalal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trusthalal -d trusthalal"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  trusthalal_pgdata: