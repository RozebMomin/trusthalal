<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Trust Halal Verified">
  <!--
    Trust Halal Verified — the core badge.

    Design intent:
      * Olive primary band carries the "TRUST HALAL" wordmark — same olive
        as the parent brand (#5B6F2B).
      * A circular badge core in cream (#F8F4EC) with a serif "Verified"
        wordmark in stone (#3A3633).
      * A pomegranate (#9C2A24) check mark anchors the badge — the one
        accent color, used here intentionally because this IS the trust
        mark.
      * The Arabic word "حلال" (halal) appears as a small, respectful
        secondary mark inside the badge core — small enough not to
        dominate, present enough to nod to the community.

    Legibility constraints:
      * Reads at 48px (IG bio icon size) AND at 4-inch window sticker.
      * Mono-color flat — no gradients, no drop shadows. Looks like a
        certification mark, not a banner ad.
  -->

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="190" fill="#F8F4EC" stroke="#5B6F2B" stroke-width="10"/>

  <!-- Inner circle (badge core background) -->
  <circle cx="200" cy="200" r="160" fill="#F8F4EC"/>

  <!-- Olive band across the middle -->
  <path d="M 40 180 A 160 160 0 0 0 360 180 Z" fill="#5B6F2B" transform="rotate(-90 200 200)"/>
  <!-- The path above isn't ideal; replace with a horizontal band clipped to the inner circle. -->
  <defs>
    <clipPath id="innerCircle">
      <circle cx="200" cy="200" r="160"/>
    </clipPath>
  </defs>
  <!-- Reset: redraw inner circle then the band -->
  <circle cx="200" cy="200" r="160" fill="#F8F4EC"/>

  <!-- Horizontal olive band, clipped to inner circle -->
  <g clip-path="url(#innerCircle)">
    <rect x="0" y="115" width="400" height="50" fill="#5B6F2B"/>
  </g>

  <!-- TRUST HALAL wordmark on the band -->
  <text
    x="200" y="148"
    font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif"
    font-size="28"
    font-weight="600"
    letter-spacing="6"
    fill="#F8F4EC"
    text-anchor="middle"
  >TRUST HALAL</text>

  <!-- Arabic word "halal" (حلال) — small, secondary, stone color -->
  <text
    x="200" y="198"
    font-family="'Amiri', 'Noto Naskh Arabic', serif"
    font-size="34"
    font-weight="400"
    fill="#3A3633"
    text-anchor="middle"
    direction="rtl"
  >حلال</text>

  <!-- "Verified" wordmark, beneath the Arabic -->
  <text
    x="200" y="240"
    font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif"
    font-size="32"
    font-style="italic"
    fill="#3A3633"
    text-anchor="middle"
  >Verified</text>

  <!-- Check mark anchor — pomegranate accent, only place it appears -->
  <g transform="translate(200 290)">
    <circle cx="0" cy="0" r="28" fill="#9C2A24"/>
    <!-- Check mark path -->
    <path
      d="M -12 0 L -4 8 L 12 -8"
      stroke="#F8F4EC"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Decorative dots on the band (subtle separators flanking the wordmark) -->
  <circle cx="68" cy="140" r="3" fill="#F8F4EC"/>
  <circle cx="332" cy="140" r="3" fill="#F8F4EC"/>
</svg>
