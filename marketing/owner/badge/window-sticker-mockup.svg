<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Trust Halal Verified — window sticker mockup">
  <!--
    Window-sticker mockup. Shows the verified badge applied to a
    restaurant door, viewed from the inside looking out. Intended
    for use in:
      * Owner landing page (hero or "what you get" section)
      * Sales sheet PDF
      * Social posts pitching the badge to owners
    Style: flat illustration, not photorealistic. Warm palette.
  -->

  <!-- Sky / outside backdrop (warm dusk) -->
  <rect x="0" y="0" width="800" height="600" fill="#E8D9BE"/>

  <!-- Distant buildings silhouette -->
  <g fill="#D9CDB5">
    <rect x="0" y="320" width="120" height="120"/>
    <rect x="100" y="280" width="160" height="160"/>
    <rect x="240" y="340" width="100" height="100"/>
    <rect x="320" y="260" width="180" height="180"/>
    <rect x="480" y="310" width="140" height="130"/>
    <rect x="600" y="290" width="200" height="150"/>
  </g>

  <!-- Sidewalk -->
  <rect x="0" y="440" width="800" height="160" fill="#B8AC93"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="#A99D85" stroke-width="2"/>
  <line x1="0" y1="540" x2="800" y2="540" stroke="#A99D85" stroke-width="2"/>

  <!-- Restaurant facade — frames the window -->
  <rect x="40" y="40" width="720" height="520" fill="#3A3633"/>

  <!-- Window glass -->
  <rect x="80" y="80" width="640" height="440" fill="#F8F4EC" opacity="0.92"/>

  <!-- Reflection lines on glass (subtle, top-left) -->
  <g opacity="0.6">
    <line x1="100" y1="100" x2="180" y2="160" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="100" x2="160" y2="140" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Inside hints — warm yellow glow from a hanging lamp visible through the glass -->
  <ellipse cx="180" cy="260" rx="80" ry="60" fill="#F4D77E" opacity="0.35"/>
  <ellipse cx="620" cy="280" rx="80" ry="60" fill="#F4D77E" opacity="0.35"/>

  <!-- Restaurant name on the window, top -->
  <text
    x="400" y="150"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="48"
    font-weight="600"
    fill="#3A3633"
    text-anchor="middle"
    opacity="0.85"
  >RESTAURANT NAME</text>
  <text
    x="400" y="180"
    font-family="'Inter', system-ui, sans-serif"
    font-size="14"
    letter-spacing="6"
    fill="#5B6F2B"
    text-anchor="middle"
    opacity="0.85"
  >EST. SINCE</text>

  <!-- The verified badge, applied to the lower-right of the window -->
  <g transform="translate(560 360) scale(0.5)">
    <!-- Outer ring -->
    <circle cx="200" cy="200" r="190" fill="#F8F4EC" stroke="#5B6F2B" stroke-width="10"/>
    <!-- Inner circle -->
    <circle cx="200" cy="200" r="160" fill="#F8F4EC"/>
    <!-- Horizontal olive band -->
    <defs>
      <clipPath id="innerCircle2">
        <circle cx="200" cy="200" r="160"/>
      </clipPath>
    </defs>
    <g clip-path="url(#innerCircle2)">
      <rect x="0" y="115" width="400" height="50" fill="#5B6F2B"/>
    </g>
    <!-- Wordmark on band -->
    <text
      x="200" y="148"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-size="28"
      font-weight="600"
      letter-spacing="6"
      fill="#F8F4EC"
      text-anchor="middle"
    >TRUST HALAL</text>
    <!-- Arabic halal -->
    <text
      x="200" y="198"
      font-family="'Amiri', serif"
      font-size="34"
      fill="#3A3633"
      text-anchor="middle"
    >حلال</text>
    <!-- Verified italic -->
    <text
      x="200" y="240"
      font-family="'Cormorant Garamond', Georgia, serif"
      font-size="32"
      font-style="italic"
      fill="#3A3633"
      text-anchor="middle"
    >Verified</text>
    <!-- Check mark -->
    <g transform="translate(200 290)">
      <circle cx="0" cy="0" r="28" fill="#9C2A24"/>
      <path d="M -12 0 L -4 8 L 12 -8" stroke="#F8F4EC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <!-- Dots -->
    <circle cx="68" cy="140" r="3" fill="#F8F4EC"/>
    <circle cx="332" cy="140" r="3" fill="#F8F4EC"/>
  </g>

  <!-- Door frame at bottom (depth cue) -->
  <rect x="40" y="520" width="720" height="40" fill="#2A2725"/>

  <!-- Caption strip across the bottom -->
  <rect x="0" y="560" width="800" height="40" fill="#3A3633"/>
  <text
    x="400" y="586"
    font-family="'Inter', system-ui, sans-serif"
    font-size="14"
    letter-spacing="3"
    fill="#F8F4EC"
    text-anchor="middle"
  >ON THE WINDOW. ON YOUR INSTAGRAM. ON THE LISTING THAT FINDS YOU CUSTOMERS.</text>
</svg>
