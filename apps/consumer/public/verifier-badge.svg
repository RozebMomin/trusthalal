<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Trust Halal Verifier">
  <!--
    Verifier badge — v2 clean-modern (emerald/ink/white), matching the
    consumer site and mobile app. VISUALLY DISTINCT from the restaurant
    Verified badge on purpose: hexagon = a community verifier vouching
    for restaurants; circle = a verified restaurant.

    Palette: emerald #0E9F6E accent, ink #0B0B0E, white surface.
    Type: Inter (no serif). Sized to read at 48px and at large scale.
  -->
  <defs>
    <clipPath id="hexClip">
      <polygon points="200,20 366,110 366,290 200,380 34,290 34,110" />
    </clipPath>
  </defs>

  <!-- Hexagon body -->
  <polygon
    points="200,20 366,110 366,290 200,380 34,290 34,110"
    fill="#FFFFFF"
    stroke="#0E9F6E"
    stroke-width="10"
    stroke-linejoin="round"
  />

  <!-- Top emerald band (clipped to hex) -->
  <g clip-path="url(#hexClip)">
    <rect x="0" y="90" width="400" height="60" fill="#0E9F6E"/>
  </g>

  <!-- Wordmark on band -->
  <text
    x="200" y="126"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="24"
    font-weight="600"
    letter-spacing="5"
    fill="#FFFFFF"
    text-anchor="middle"
  >TRUST HALAL</text>

  <!-- Person icon (silhouette) — center-upper -->
  <g transform="translate(200 200)">
    <circle cx="0" cy="-32" r="18" fill="#0B0B0E"/>
    <path
      d="M -42 20 Q -42 -12 0 -12 Q 42 -12 42 20 L 42 30 L -42 30 Z"
      fill="#0B0B0E"
    />
    <!-- Emerald check badge in the corner of the person icon -->
    <g transform="translate(30 12)">
      <circle cx="0" cy="0" r="16" fill="#0E9F6E"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#FFFFFF" stroke-width="2"/>
      <path
        d="M -7 0 L -2 5 L 8 -5"
        stroke="#FFFFFF"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
    </g>
  </g>

  <!-- Verifier wordmark -->
  <text
    x="200" y="288"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#0B0B0E"
    text-anchor="middle"
  >Verifier</text>

  <!-- Small caption line under the wordmark -->
  <text
    x="200" y="320"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="10"
    font-weight="600"
    letter-spacing="3"
    fill="#0E9F6E"
    text-anchor="middle"
  >COMMUNITY · IN PERSON · INDEPENDENT</text>

  <!-- Two small decorative dots flanking the wordmark on the band -->
  <circle cx="50" cy="120" r="3" fill="#FFFFFF"/>
  <circle cx="350" cy="120" r="3" fill="#FFFFFF"/>
</svg>
